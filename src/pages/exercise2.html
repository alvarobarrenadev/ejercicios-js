  <body>
    <div class="exercise2">
      <!-- Decorative background blobs -->
      <div class="exercise2__blob exercise2__blob--1" aria-hidden="true"></div>
      <div class="exercise2__blob exercise2__blob--2" aria-hidden="true"></div>

      <main class="exercise2__card">
        <header class="exercise2__header">
          <span class="exercise2__badge">
            <i class="fa-solid fa-calculator"></i>
            DOM Counter
          </span>
          <h1 class="exercise2__title">Contador de <span class="exercise2__title-highlight">Clics</span></h1>
          <p class="exercise2__desc">Haz clic en el botón para incrementar el contador en tiempo real.</p>
        </header>

        <div class="exercise2__counter-wrapper">
          <span id="contador" class="exercise2__number">0</span>
        </div>

        <button id="btn-contar" class="exercise2__button">
          <i class="fa-solid fa-plus"></i>
          Incrementar
        </button>

        <footer class="exercise2__footer">
