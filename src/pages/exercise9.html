<html lang="es">

    <meta charset="UTF-8">

    <meta property="og:image" content="https://alvarobarrenadev.github.io/ejercicios-js/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://alvarobarrenadev.github.io/ejercicios-js/src/pages/exercise9.html" />

    <title>Ejercicio 9 - Lista de Tareas</title>
  </head>
  <body>
    <div class="exercise9">
      <!-- Decorative background blobs -->
      <div class="exercise9__blob exercise9__blob--1" aria-hidden="true"></div>
      <div class="exercise9__blob exercise9__blob--2" aria-hidden="true"></div>

      <main class="exercise9__card">
        <header class="exercise9__header">
          <span class="exercise9__badge">
            <i class="fa-solid fa-list-check"></i>
            Task Manager
          </span>
          <h1 class="exercise9__title">Mis <span class="exercise9__title-highlight">Tareas</span></h1>
          <p class="exercise9__desc">Organiza tu día y mantén tus tareas bajo control.</p>
        </header>

        <div class="exercise9__form">
          <input type="text" id="input-tarea" class="exercise9__input" placeholder="¿Qué tienes pendiente?">
          <button id="btn-agregar" class="exercise9__add-btn">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <ul id="lista-tareas" class="exercise9__list">
          <!-- Tasks will be added here -->
        </ul>

        <div class="exercise9__actions">
          <button id="btn-limpiar" class="exercise9__clear-btn">
            <i class="fa-solid fa-broom"></i>
            Limpiar completadas
          </button>
        </div>

        <footer class="exercise9__footer">
          <a href="../../index.html" class="exercise9__back">
            <i class="fa-solid fa-arrow-left"></i>
            Volver al inicio
          </a>
        </footer>
      </main>
    </div>
    <script type="module" src="../js/exercises/exercise9.js"></script>
  </body>
</html>
